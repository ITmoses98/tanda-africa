name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create _redirects for SPA
        run: echo "/*    /index.html   200" > dist/_redirects
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 8acd68e4-0d17-4278-ad11-3f5402f84ea0
        run: |
          ZIP_FILE=/tmp/tanda-deploy.zip
          cd dist
          zip -r $ZIP_FILE .
          cd /
          curl -s -X POST "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary "@$ZIP_FILE" | jq -r '"Deployed: " + .ssl_url'
